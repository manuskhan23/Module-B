<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Mark Sheet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Student Mark Sheet</h2>

        <!-- Step 1 -->
        <div id="step1">
            <div class="form-floating mb-3">
                <input type="text" id="schoolName" class="form-control" placeholder="School Name">
                <label for="schoolName">School Name</label>
            </div>
            <div class="form-floating mb-3">
                <input type="number" id="subjectCount" class="form-control" placeholder="Number of Subjects" min="1">
                <label for="subjectCount">Number of Subjects</label>
            </div>
            <button class="btn btn-primary w-100" onclick="generateSubjectInputs()">Next</button>
        </div>

        <!-- Step 2 -->
        <form id="step2" style="display:none;">
            <div id="subjectsContainer"></div>
            <button type="button" class="btn btn-primary w-100 mt-3" onclick="generateMarkInputs()">Next</button>
        </form>

        <!-- Step 3 -->
        <form id="step3" style="display:none;">
            <div id="marksContainer"></div>
            <button type="button" class="btn btn-success w-100 mt-3" onclick="showMarkSheet()">Generate Mark Sheet</button>
        </form>

        <!-- Mark Sheet -->
        <div id="markSheet" class="mt-4" style="display:none;"></div>
        <a href="cgpa.html" style="text-decoration: none; text-align: center; margin-top: 20px;" id="cgpa">I am University Student!</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
