<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="mainBox" class="box">
    <h2>Select Mobile</h2>

    <label>Brand:</label>

</div>

<script src="app.js"></script>

</body>
</html>
